<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mask AI Chat</title>
    <!-- Markdown Parser (marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for Knowledge Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <!-- CSS Reference -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Side Navigation Bar -->
    <div class="sidebar" id="sidebar">
        <!-- Company Logo -->
        <div class="logo-container">
            <img src="/static/images/sharekhan_logo-202207131537046949004.svg" alt="Company Logo" class="brand-logo">
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            New chat
        </button>
        <div class="recent-section">
            <div class="recent-title">Recent</div>
            <!-- Future mein yahan purani chats ki list aayegi -->
        </div>
    </div>
    
    <!-- Main Chat Window -->
    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <button class="toggle-btn" onclick="toggleSidebar()" aria-label="Toggle Sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <span class="app-title">Mask AI</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="toggle-btn" onclick="toggleDarkMode()" aria-label="Toggle Dark Mode" title="Dark Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="clear-btn" onclick="clearChat()">Clear History</button>
            </div>
        </div>
        {% block content %}{% endblock %}
    </div>

    <!-- JS Reference -->
    <script src="/static/js/script.js"></script>
</body>
</html>
